# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - my-csharp-apiazurewebsitesnet

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
    - name: Set up .NET Core
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.x' # Укажите версию .NET, которая прописана в вашем csproj

    - name: Restore dependencies
      run: dotnet restore Task_2_TranscriptAnalysis.csproj

    - name: Build with dotnet
      run: dotnet build Task_2_TranscriptAnalysis.csproj --configuration Release --no-restore

    - name: dotnet publish
      run: dotnet publish Task_2_TranscriptAnalysis.csproj -c Release -o ${{env.DOTNET_ROOT}}/myapp

    - name: Upload artifact for deployment job
      uses: actions/upload-artifact@v3
      with:
        name: .net-app
        path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_5F15814174EF4BCC89ABD165F095DB47 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C389C3FAB378477E8EE4307BA26045D0 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_8B5E9C21B4AE4B158037E43538852828 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'my-csharp-apiazurewebsitesnet'
          slot-name: 'Production'
          package: .
          
